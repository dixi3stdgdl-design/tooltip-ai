version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: TooltipAI.Backend/Dockerfile
    container_name: tooltipai-backend
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - License__HmacKey=${LICENSE_HMAC_KEY:-TooltipAI-DefaultKey-Change-Me}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - tooltipai

networks:
  tooltipai:
    driver: bridge
