name: Build, Test and Deploy TooltipAI to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  AZURE_WEBAPP_NAME: 'tooltip-ai'
  AZURE_RESOURCE_GROUP: 'dixi3stdgdl-design'  # <-- ajustar si tu RG tiene otro nombre

jobs:
  # ─── FASE 1: Build + Test ────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --configuration Release --verbosity normal --no-build

      - name: Publish backend (ASP.NET Core)
        run: dotnet publish TooltipAI.Backend/TooltipAI.Backend.csproj -c Release -o ${{ github.workspace }}/publish-backend --no-build

      - name: Publish desktop client (Windows)
        run: dotnet publish TooltipAI.Tray/TooltipAI.Tray.csproj -c Release -r win-x64 --self-contained false -o ${{ github.workspace }}/publish-desktop --no-build

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: ${{ github.workspace }}/publish-backend

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-publish
          path: ${{ github.workspace }}/publish-desktop

  # ─── FASE 2: Docker build (Azure Linux 4) ───────────────────
  docker:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-publish
          path: ./publish

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            --build-arg BUILD_VERSION=${{ github.sha }} \
            --tag tooltipai-backend:${{ github.sha }} \
            --tag tooltipai-backend:latest \
            -f TooltipAI.Backend/Dockerfile .

      - name: Smoke test container
        run: |
          docker run -d --name test-backend -p 8080:8080 tooltipai-backend:latest
          sleep 5
          echo "=== Health Check ==="
          curl -sf http://localhost:8080/health || (echo "HEALTH CHECK FAILED" && docker logs test-backend && exit 1)
          echo ""
          echo "=== API Root ==="
          curl -sf http://localhost:8080/ || (echo "ROOT CHECK FAILED" && docker logs test-backend && exit 1)
          docker stop test-backend
          echo "Docker smoke test PASSED"

      - name: Save Docker image
        run: docker save tooltipai-backend:latest | gzip > /tmp/tooltipai-backend.tar.gz

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/tooltipai-backend.tar.gz

  # ─── FASE 3: Deploy to Azure Web App ────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      id-token: write
      contents: read

    environment:
      name: production
      url: https://api.tooltip-ai.com

    steps:
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_5AD4A456147D40B2B06C88136175CCF8 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9EEC63FAF6F244E7896E2879019989BC }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_87A5E93DC4384FD192D1298AEEB4D9C7 }}

      - name: Load Docker image
        run: docker load < tooltipai-backend.tar.gz

      - name: Deploy to Azure Web App (container)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: 'Production'
          images: tooltipai-backend:latest

      - name: Verify deployment
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 15
          echo "=== Health Check (Azure) ==="
          curl -sf https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/health || echo "Warning: health check may take a moment"
          echo ""
          echo "=== Health Check (Custom Domain) ==="
          curl -sf https://api.tooltip-ai.com/health || echo "Warning: DNS may not be configured yet"

      - name: Configure custom domain
        run: |
          echo "=== Custom Domain Setup ==="
          echo "Run locally with Azure CLI:"
          echo ""
          echo "  az webapp config hostname add \\"
          echo "    --webapp-name ${{ env.AZURE_WEBAPP_NAME }} \\"
          echo "    --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \\"
          echo "    --hostname api.tooltip-ai.com"
          echo ""
          echo "DNS Record needed at your registrar:"
          echo "  Type: CNAME"
          echo "  Host: api"
          echo "  Value: ${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          echo "  TTL: 3600"

  # ─── FASE 4: Create GitHub Release ──────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download desktop artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-publish
          path: ./desktop

      - name: Create zip
        run: cd desktop && zip -r ../TooltipAI-Desktop-win-x64.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-${{ github.run_number }}
          name: "TooltipAI v1.0.0 (Build ${{ github.run_number }})"
          body: |
            ## Backend
            - Deployed to Azure Web App (Azure Linux 4)
            - API: https://api.tooltip-ai.com
            - Health: https://api.tooltip-ai.com/health

            ## Desktop Client
            - Windows x64 build included
            - .NET 8 runtime required
          files: TooltipAI-Desktop-win-x64.zip
          draft: false
          prerelease: false
