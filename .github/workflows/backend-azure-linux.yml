name: Backend — Azure Linux 4 Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'TooltipAI.Backend/**'
      - 'Dockerfile'
      - '.github/workflows/backend-azure-linux.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  AZURE_WEBAPP_NAME: 'tooltip-ai'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore TooltipAI.Backend/TooltipAI.Backend.csproj

      - name: Build
        run: dotnet build TooltipAI.Backend/TooltipAI.Backend.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish TooltipAI.Backend/TooltipAI.Backend.csproj -c Release -o ./publish --no-build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build \
            --tag tooltipai-backend:${{ github.sha }} \
            --tag tooltipai-backend:latest \
            -f TooltipAI.Backend/Dockerfile .

      - name: Smoke test
        run: |
          docker run -d --name test -p 8080:8080 tooltipai-backend:latest
          sleep 5
          curl -sf http://localhost:8080/health || (docker logs test && exit 1)
          docker stop test

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_5AD4A456147D40B2B06C88136175CCF8 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9EEC63FAF6F244E7896E2879019989BC }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_87A5E93DC4384FD192D1298AEEB4D9C7 }}

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: 'Production'
          images: tooltipai-backend:latest
