name: Build Windows MSI

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build-msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore TooltipAI.Platform.Win/TooltipAI.Platform.Win.csproj

      - name: Build
        run: dotnet build TooltipAI.Platform.Win/TooltipAI.Platform.Win.csproj -c Release --no-restore

      - name: Publish
        run: |
          dotnet publish TooltipAI.Platform.Win/TooltipAI.Platform.Win.csproj `
            -c Release `
            -r win-x64 `
            --self-contained `
            -p:PublishTrimmed=true `
            -p:PublishSingleFile=true `
            -o ./publish-win

      - name: Install WiX
        run: dotnet tool install --global wix

      - name: Build MSI
        run: |
          wix build installer/TooltipAI.wxs `
            -d PublishDir=publish-win `
            -o dist/TooltipAI-v1.0.0-win-x64.msi

      - name: Generate Hash
        run: |
          certutil -hashfile dist/TooltipAI-v1.0.0-win-x64.msi SHA256 > dist/TooltipAI-v1.0.0-win-x64.msi.sha256

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: dist/TooltipAI-v1.0.0-win-x64.msi

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/TooltipAI-v1.0.0-win-x64.msi
            dist/TooltipAI-v1.0.0-win-x64.msi.sha256
          generate_release_notes: true
